# Netlify config — static frontend in /public, serverless functions in /netlify/functions
[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean API path -> single CRUD function (method-routed inside the function)
[[redirects]]
  from = "/api/records"
  to = "/.netlify/functions/records"
  status = 200

# Airtable webhook receiver -> Telegram alerts
[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/airtable-webhook"
  status = 200
