<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Pipeline — Post-Production Workflow Tracker</title>
  <meta name="description" content="Track TV+ post-production deliverables through editorial, VFX, color, mix, QC and delivery. Netlify + Airtable." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Post Pipeline</h1>
      <p class="tag">TV+ post-production deliverables, stage by stage.</p>
    </div>
    <button id="newBtn" class="btn btn-primary">+ New Deliverable</button>
  </header>

  <main>
    <div id="banner" class="banner" hidden></div>
    <div id="board" class="board" aria-live="polite"></div>
  </main>

  <!-- New / edit deliverable dialog -->
  <dialog id="dialog">
    <form id="form" method="dialog">
      <h2 id="formTitle">New Deliverable</h2>
      <input type="hidden" id="recId" />
      <label>Title<span class="req">*</span>
        <input id="f-Title" required placeholder="Ep 104 — Final Mix" />
      </label>
      <label>Show
        <input id="f-Show" placeholder="Midnight Harbor" />
      </label>
      <div class="row">
        <label>Stage
          <select id="f-Stage"></select>
        </label>
        <label>Status
          <select id="f-Status"></select>
        </label>
        <label>Priority
          <select id="f-Priority"></select>
        </label>
      </div>
      <div class="row">
        <label>Due
          <input type="date" id="f-Due" />
        </label>
        <label>Assignee
          <input id="f-Assignee" placeholder="A. Rivera" />
        </label>
      </div>
      <label>Notes
        <textarea id="f-Notes" rows="2" placeholder="Awaiting client notes on reel 3."></textarea>
      </label>
      <div class="actions">
        <button type="button" id="cancelBtn" class="btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
